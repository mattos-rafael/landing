    <h1>Contact</h1>
    <section id="contact" class="content">
      <form id="contactForm">
        <label for="fname">Name:</label>
        <input type="text" id="fname" name="fname" placeholder="" minlength="3" maxlenght="30" required />
        <label for="fname">Email:</label>
        <input type="email" id="email" name="email" placeholder="" minlength="3" maxlenght="30" required />
        <label for="fname">Message:</label>
        <textarea name="message" id="message" rows="4" cols="50"></textarea>

        <input id="send" type="submit" value="Enviar" />
      </form>
    </section>
